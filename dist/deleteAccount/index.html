    <script>
      // Anti-FOUC: apply saved/system theme before first paint
      (function () {
        try {
          var s = localStorage.getItem('moments-theme');
          var dark = s ? s === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
